<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Financiera</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #resultado { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="card">
    <h2>Interés Compuesto</h2>
    <label>Capital Inicial ($):</label>
    <input type="number" id="capital" placeholder="Ej. 1000">
    <label>Tasa Anual (%):</label>
    <input type="number" id="tasa" placeholder="Ej. 5">
    <label>Años:</label>
    <input type="number" id="tiempo" placeholder="Ej. 10">
    <button onclick="calcular()">Calcular</button>
    <div id="resultado"></div>
</div>

<script>
    function calcular() {
        const C = parseFloat(document.getElementById('capital').value);
        const i = parseFloat(document.getElementById('tasa').value) / 100;
        const n = parseFloat(document.getElementById('tiempo').value);
        
        // Fórmula: M = C * (1 + i)^n
        const montoFinal = C * Math.pow((1 + i), n);
        
        document.getElementById('resultado').innerText = 
            "Total acumulado: $" + montoFinal.toLocaleString('es-CO', {maximumFractionDigits: 2});
    }
</script>

</body>
</html>
